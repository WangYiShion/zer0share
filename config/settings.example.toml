# ============================================================
# zer0share 配置示例
#
# 使用方式：复制本文件为 config/settings.toml 后修改路径与开关。
#   cp config/settings.example.toml config/settings.toml
#
# 环境变量（勿写入本文件、勿将 token 提交到 Git）：
#   TUSHARE_TOKEN   - 必填，Tushare Pro
#   PUSHPLUS_TOKEN  - 可选；若设置，与企业微信并行推送相同摘要（见 notifier 实现）
# ============================================================

# Tushare Token 仅通过环境变量 TUSHARE_TOKEN 提供（勿写在本文件）。

[paths]
data_dir = "data"
db_path = "db/meta.duckdb"
log_path = "logs/pipeline.log"

[scheduler]
daily_kline_hour = 18
daily_kline_minute = 0
basic_hour = 8
adj_factor_hour = 18
adj_factor_minute = 5
# stk_limit_hour = 18
# stk_limit_minute = 10
# stock_st_hour = 18
# stock_st_minute = 15
# daily_basic_hour = 18
# daily_basic_minute = 20
# suspend_d_hour = 18
# suspend_d_minute = 25

[notifier]
# 企业微信机器人；与 PUSHPLUS_TOKEN 互不排斥
wecom_webhook_url = "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"
enabled = false
